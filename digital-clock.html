<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s ease-out forwards;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .clock-card:nth-child(1) { animation-delay: 0.1s; }
        .clock-card:nth-child(2) { animation-delay: 0.2s; }
        .clock-card:nth-child(3) { animation-delay: 0.3s; }
        .clock-card:nth-child(4) { animation-delay: 0.4s; }
        .clock-card:nth-child(5) { animation-delay: 0.5s; }
        .clock-card:nth-child(6) { animation-delay: 0.6s; }
        .clock-card:nth-child(7) { animation-delay: 0.7s; }
        .clock-card:nth-child(8) { animation-delay: 0.8s; }
        .clock-card:nth-child(9) { animation-delay: 0.9s; }
        .clock-card:nth-child(10) { animation-delay: 1s; }
        .clock-card:nth-child(11) { animation-delay: 1.1s; }
        .clock-card:nth-child(12) { animation-delay: 1.2s; }

        .timezone-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            font-style: italic;
        }

        .digital-time {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .date-display {
            font-size: 0.95em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
        }

        .day-display {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
            text-transform: capitalize;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn.active {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            color: #00ff88;
        }

        .format-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .format-btn {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .format-btn.active {
            background: #00ff88;
            color: #1e3c72;
            border-color: #00ff88;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 30px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .clocks-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 15px;
            }

            .clock-card {
                padding: 20px;
            }

            .digital-time {
                font-size: 2em;
            }

            .timezone-name {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Global Time</h1>
            <p>Real-time clock display across different time zones</p>
        </div>

        <div class="controls">
            <button class="btn active" onclick="showTimezones('all')">All Time Zones</button>
            <button class="btn" onclick="showTimezones('asia')">Asia</button>
            <button class="btn" onclick="showTimezones('europe')">Europe</button>
            <button class="btn" onclick="showTimezones('americas')">Americas</button>
        </div>

        <div class="format-toggle">
            <button class="format-btn active" onclick="setTimeFormat(24)">24 Hour</button>
            <button class="format-btn" onclick="setTimeFormat(12)">12 Hour</button>
        </div>

        <div class="clocks-grid" id="clocksGrid">
            <!-- Clocks will be inserted here -->
        </div>

        <div class="footer">
            <p>Last updated: <span id="updateTime">just now</span></p>
        </div>
    </div>

    <script>
        let timeFormat = 24;
        let currentFilter = 'all';

        const timezones = {
            'asia': [
                { name: 'Tokyo', zone: 'Asia/Tokyo', offset: '+09:00' },
                { name: 'Hong Kong', zone: 'Asia/Hong_Kong', offset: '+08:00' },
                { name: 'Singapore', zone: 'Asia/Singapore', offset: '+08:00' },
                { name: 'Dubai', zone: 'Asia/Dubai', offset: '+04:00' },
                { name: 'India', zone: 'Asia/Kolkata', offset: '+05:30' },
                { name: 'Bangkok', zone: 'Asia/Bangkok', offset: '+07:00' }
            ],
            'europe': [
                { name: 'London', zone: 'Europe/London', offset: '+00:00' },
                { name: 'Paris', zone: 'Europe/Paris', offset: '+01:00' },
                { name: 'Berlin', zone: 'Europe/Berlin', offset: '+01:00' },
                { name: 'Moscow', zone: 'Europe/Moscow', offset: '+03:00' },
                { name: 'Istanbul', zone: 'Europe/Istanbul', offset: '+03:00' },
                { name: 'Amsterdam', zone: 'Europe/Amsterdam', offset: '+01:00' }
            ],
            'americas': [
                { name: 'New York', zone: 'America/New_York', offset: '-05:00' },
                { name: 'Los Angeles', zone: 'America/Los_Angeles', offset: '-08:00' },
                { name: 'Toronto', zone: 'America/Toronto', offset: '-05:00' },
                { name: 'Mexico City', zone: 'America/Mexico_City', offset: '-06:00' },
                { name: 'São Paulo', zone: 'America/Sao_Paulo', offset: '-03:00' },
                { name: 'Buenos Aires', zone: 'America/Argentina/Buenos_Aires', offset: '-03:00' }
            ]
        };

        function getAllTimezones() {
            return [...timezones.asia, ...timezones.europe, ...timezones.americas];
        }

        function getTimeInTimezone(zone) {
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: zone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: timeFormat === 12
            });

            const dateFormatter = new Intl.DateTimeFormat('en-US', {
                timeZone: zone,
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });

            const dayFormatter = new Intl.DateTimeFormat('en-US', {
                timeZone: zone,
                weekday: 'long'
            });

            return {
                time: formatter.format(new Date()),
                date: dateFormatter.format(new Date()),
                day: dayFormatter.format(new Date())
            };
        }

        function createClockCard(timezone) {
            const timeData = getTimeInTimezone(timezone.zone);
            
            const card = document.createElement('div');
            card.className = 'clock-card';
            card.innerHTML = `
                <div class="timezone-name">${timezone.name}</div>
                <div class="timezone-label">${timezone.zone}</div>
                <div class="digital-time">${timeData.time}</div>
                <div class="date-display">${timeData.date}</div>
                <div class="day-display">${timeData.day}</div>
            `;
            return card;
        }

        function updateAllClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = '';

            let timezonesToDisplay;
            if (currentFilter === 'all') {
                timezonesToDisplay = getAllTimezones();
            } else {
                timezonesToDisplay = timezones[currentFilter];
            }

            timezonesToDisplay.forEach((timezone, index) => {
                const card = createClockCard(timezone);
                grid.appendChild(card);
            });

            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
        }

        function showTimezones(filter) {
            currentFilter = filter;
            updateAllClocks();

            // Update button states
            document.querySelectorAll('.controls .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function setTimeFormat(format) {
            timeFormat = format;
            updateAllClocks();

            // Update button states
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // Initial render
        updateAllClocks();

        // Update clocks every second
        setInterval(updateAllClocks, 1000);
    </script>
</body>
</html>
